<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For My Only Love</title>

<style>

body{
margin:0;
background:#f3f4f6;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
text-align:center;
max-width:800px;
width:90%;
}

h1{
margin-top:0;
margin-bottom:20px;
font-size:26px;
}

.video-container{
position:relative;
}

video{
width:100%;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.play-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
width:80px;
height:80px;
border-radius:50%;
border:none;
background:white;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.download{
display:inline-block;
margin-top:18px;
padding:10px 18px;
background:#ef476f;
color:white;
text-decoration:none;
border-radius:30px;
font-weight:bold;
}

.note{
margin-top:10px;
font-size:13px;
color:#777;
}

</style>
<!-- Google tag (gtag.js) - Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-0FXRHY5YZ6"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-0FXRHY5YZ6');
</script>
</head>

<body>

<div class="card">

<h1>This is for you, my only love ❤️</h1>

<div class="video-container">

<video id="loveVideo" loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<button id="playButton" class="play-btn">▶</button>

</div>

<a class="download" href="video.mp4" download>
⬇ Download Video
</a>

<div class="note">Made just for you.</div>

</div>

<script>

const video = document.getElementById("loveVideo");
const button = document.getElementById("playButton");

button.addEventListener("click", function(){

video.muted = false;
video.play();

button.style.display = "none";

});

</script>

</body>

</html>
